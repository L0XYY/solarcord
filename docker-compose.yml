services:
  postgres:
    image: postgres:16-alpine
    container_name: solarcord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarcord
      POSTGRES_PASSWORD: solarcord
      POSTGRES_DB: solarcord
    ports:
      - "5432:5432"
    volumes:
      - solarcord_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarcord"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: solarcord-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - solarcord_redis:/data

volumes:
  solarcord_pg:
  solarcord_redis:
